name: Erlang CI

on:
  push:
  pull_request:

jobs:

  build:
    runs-on: ubuntu-latest
    strategy: 
      matrix:
        erlang: [ 27,28 ]

    container:
      image: erlang:${{ matrix.erlang }}

    steps:
    - uses: actions/checkout@v2
    - run: make compile

  reltest:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        erlang: [ 27,28 ]

    container:
      image: erlang:${{ matrix.erlang }}
      # --init gives PID 1 a real init (tini) that reaps zombie children.
      # Without it, BEAM exits cleanly but becomes a <defunct> zombie under
      # the default `tail -f /dev/null` entrypoint, and `antidote stop`'s
      # `while kill -0 $PID` polling loop hangs because kill -0 returns 0
      # for zombie PIDs until they are reaped.
      options: --init

    steps:
    - uses: actions/checkout@v2
    - run: make compile
    - name: Release Test
      run: make reltest

  test:
    runs-on: ubuntu-latest
    strategy: 
      matrix:
        erlang: [ 27,28 ]

    container:
      image: erlang:${{ matrix.erlang }}

    steps:
    - uses: actions/checkout@v2
    - run: make compile
    - name: Run epmd
      run: epmd -daemon
    - name: Unit Tests
      run: make test
    - name: Property-Based Tests
      run: make proper
    - name: System Tests
      run: make systests
    - name: Coverage
      run: make coverage
    - name: Send Coverage
      if: matrix.erlang == 28
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: ./rebar3 as test coveralls send

  verify:
    runs-on: ubuntu-latest
    strategy: 
      matrix:
        erlang: [ 27,28 ]

    container:
      image: erlang:${{ matrix.erlang }}

    steps:
    - uses: actions/checkout@v2
    - name: Xref
      run: make xref
    - name: Lint
      run: make lint
    - name: Dialyzer
      run: make dialyzer
